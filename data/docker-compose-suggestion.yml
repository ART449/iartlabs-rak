# iartlabs-infra/docker-compose.yml (sugerencia)
# Levanta el ecosistema completo localmente.

services:
  colmena:
    build:
      context: ../Colmena
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./colmena.db}
    volumes:
      - ./memory:/app/memory
    depends_on:
      - ollama

  inbeebox:
    build:
      context: ../INBEEBOX
    ports:
      - "8002:8002"
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./inbeebox.db}
    depends_on:
      - colmena

  kaizen:
    build:
      context: ../kaizen-backend
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./kaizen.db}
    depends_on:
      - colmena

  memo-desktop:
    build:
      context: ../Memo-Desktop
    ports:
      - "8787:8787"
    env_file:
      - .env

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  thehive:
    build:
      context: ../thehive-voice-mesh
    ports:
      - "3000:3000"
    env_file:
      - .env

volumes:
  ollama-data:
